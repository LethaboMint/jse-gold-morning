name: Morning signals & GitHub Pages

on:
  schedule:
    # 04:00 UTC ≈ 06:00 SAST — after US gold/GDX close
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-signals.txt

      - name: Generate signals (Yahoo)
        run: python generate_daily_signals.py

      - name: Publish site data
        run: python scripts/publish_pages_data.py

      - name: Commit signal artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signals.json data/forward_model/latest_signals.json data/forward_model/latest_signals.csv || true
          git diff --staged --quiet || git commit -m "chore: update morning signals [skip ci]"
          git push || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deploy
