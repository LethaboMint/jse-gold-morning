name: Deploy morning signals site

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements-signals.txt

      - name: Generate signals
        run: python generate_daily_signals.py

      - name: Audit predictions vs realized t+1
        run: python audit_forward_log.py

      - run: python scripts/publish_pages_data.py

      - name: Commit forward log and audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forward_model/predictions_log.csv data/forward_model/predictions_audited.csv data/forward_model/forward_audit_summary.json docs/signals.json docs/audit.json docs/performance.json docs/site_data.json || true
          git diff --staged --quiet || git commit -m "chore: daily signals and forward audit [skip ci]"
          git push || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deploy
